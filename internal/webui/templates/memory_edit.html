{{template "layout" .}}

{{define "content"}}
<div class="card">
    <h2>Edit Memory</h2>
    {{if .Error}}
    <p class="error">{{.Error}}</p>
    {{end}}
    <form method="POST" action="/ui/memories/{{.Memory.ID}}/edit">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{.Memory.Title}}" required class="search-input">
        </div>
        <div class="form-group">
            <label for="type">Type</label>
            <input type="text" id="type" name="type" value="{{.Memory.Type}}" class="search-input">
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="10" required class="search-input">{{.Memory.Content}}</textarea>
        </div>
        <div class="form-group">
            <button type="submit" class="btn">Save</button>
            <a href="/ui/memories" class="btn btn-small">Cancel</a>
        </div>
    </form>
</div>
{{end}}
