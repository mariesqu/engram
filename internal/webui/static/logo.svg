<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="engram">
  <!-- engram mark: a neuron — soma (memory core) with radiating dendrites
       ending in synaptic boutons. Gold on transparent; the UI adds a glow. -->
  <g stroke="#e8a845" stroke-width="1.7" stroke-linecap="round">
    <line x1="16" y1="16" x2="5.4"  y2="5.4"/>
    <line x1="16" y1="16" x2="26.6" y2="5.8"/>
    <line x1="16" y1="16" x2="3.8"  y2="19.2"/>
    <line x1="16" y1="16" x2="28.2" y2="20.5"/>
    <line x1="16" y1="16" x2="16.6" y2="28.2"/>
  </g>
  <g fill="#e8a845">
    <circle cx="5.4"  cy="5.4"  r="1.9"/>
    <circle cx="26.6" cy="5.8"  r="1.9"/>
    <circle cx="3.8"  cy="19.2" r="1.75"/>
    <circle cx="28.2" cy="20.5" r="1.75"/>
    <circle cx="16.6" cy="28.2" r="1.9"/>
  </g>
  <circle cx="16" cy="16" r="5"   fill="#e8a845"/>
  <circle cx="16" cy="16" r="2.2" fill="#f5c97a"/>
</svg>
